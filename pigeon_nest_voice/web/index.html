<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon Nest Voice — 鸽子窝语音</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- 背景粒子层 -->
    <canvas id="particleCanvas"></canvas>

    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="logo">🕊️</span>
                <span class="logo-text">PNV</span>
            </div>
            <button class="sidebar-btn new-chat-btn" id="newChatBtn" title="新建对话">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span>新建对话</span>
            </button>
            <div class="session-list" id="sessionList"></div>
            <div class="sidebar-footer">
                <span class="session-info" id="sessionInfo"></span>
            </div>
        </aside>

        <!-- 主内容区 -->
        <div class="main-panel">
            <header class="app-header">
                <button class="hamburger" id="sidebarToggle" title="切换侧栏">
                    <span></span><span></span><span></span>
                </button>
                <div class="header-center">
                    <h1>Pigeon Nest Voice</h1>
                    <p class="subtitle">鸽子窝语音 · 本地智能语音助手</p>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle" title="切换主题">
                        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
            </header>

            <main class="chat-area" id="chatArea">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">🕊️</div>
                    <h2>欢迎使用鸽子窝语音助手</h2>
                    <p>输入文字或点击麦克风开始对话</p>
                    <div class="quick-actions">
                        <button class="quick-btn" data-msg="现在几点了">🕐 现在几点</button>
                        <button class="quick-btn" data-msg="今天天气怎么样">🌤️ 查天气</button>
                        <button class="quick-btn" data-msg="系统状态">💻 系统状态</button>
                    </div>
                </div>
            </main>

            <footer class="input-area">
                <div class="input-wrapper">
                    <textarea id="textInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1" autocomplete="off"></textarea>
                    <div class="input-actions">
                        <button id="micBtn" class="action-btn mic-btn" title="点击录音">
                            <svg class="mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                            <svg class="stop-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                        </button>
                        <button id="sendBtn" class="action-btn send-btn" title="发送">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <!-- 录音可视化浮层 -->
    <div class="voice-overlay" id="voiceOverlay">
        <div class="voice-modal">
            <canvas id="waveformCanvas" width="300" height="80"></canvas>
            <p id="voiceStatusText">正在录音...</p>
            <button class="voice-cancel-btn" id="voiceCancelBtn">取消</button>
        </div>
    </div>

    <!-- 通知 Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/app.js"></script>
</body>
</html>
