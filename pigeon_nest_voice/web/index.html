<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon Nest Voice — 鸽子窝语音</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🕊️ Pigeon Nest Voice</h1>
            <p class="subtitle">鸽子窝语音 · 本地智能语音助手</p>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="bubble">你好！我是鸽子窝语音助手，有什么可以帮你的？</div>
            </div>
        </main>

        <footer class="input-area">
            <input type="text" id="textInput" placeholder="输入消息..." autocomplete="off">
            <button id="micBtn" class="icon-btn" title="点击录音">🎙️</button>
            <button id="sendBtn" title="发送">发送</button>
        </footer>
    </div>

    <div class="voice-status" id="voiceStatus">
        <div class="voice-indicator">
            <span class="pulse-dot"></span>
            <span id="voiceStatusText">正在录音...</span>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
